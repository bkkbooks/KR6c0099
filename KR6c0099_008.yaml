body:
  text: 秦三藏法師鳩摩羅什譯經唐圭山大師宗密述疏宋長水沙門子璿録記清荊溪後學沙門行策會編八斷持說未脫苦果疑疏二初隨章敘疑論云向說捨身苦身果報故福劣若爾依此法門持說諸菩薩行苦行亦是苦果云何此法不成苦果初三句指疑起處此從前內財校量中來謂河沙命施全勝外財猶感苦身故名為劣若爾者印定前說依此下結成疑也謂依此經受持解說不憚勞苦即是菩薩行菩薩之行無所不為剜身然燈割股救鴿一句投火半偈亡軀供佛燒身捐形飼虎如是等行皆名苦因為行頗同果證何異因果既等何勝劣哉云何等者意明前捨身命即成苦果今受持經亦是苦行何故不成苦果耶二依經斷疑二如疏列斷之文二初明超忍以斷疑二初明忍體須菩提忍辱波羅蜜如來說非忍辱波羅蜜意云忍辱波羅蜜者勝義諦中則無此相故云非忍辱等斷疑意者若如汝言受持此經及菩薩行苦行便同捨身俱成苦果者此義不然以前捨身不達無相即成苦果持說此法菩薩苦行達無我人知忍無忍彼岸非岸直造本源豈成苦果故云忍辱非忍辱等忍到彼岸已離苦相況彼岸非岸誰苦誰忍忍到等者然此以超忍為體須知本末五重然後閲此疏文則明見其理五重者一是本源之心非動非靜二不忍謂以怨報怨三忍雖不加報未能忘懷即未到彼岸忍四亡情絶慮寂然不動即到彼岸忍五非動非靜即超彼岸忍為治動心且居靜境動既非實靜豈為真若準五門方為究竟與其第一更無二源體相常然竟無改易今言忍辱波羅蜜即第四門非忍辱波羅蜜即第五門離苦相者已越第三彼岸非岸兼超第四尚踰靜境豈有動心初後兩端正當忍體二明忍相二初引一生證極苦忍二初正明何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相徵意云以何義故能行此忍釋意云以無我人等相故也歌利此云極惡佛昔作仙山中修道王獵疲寢妃共禮仙王問得四果皆答不得王怒割截天怒雨石王懼而懺悔仙證本無瞋王乃免害論云不但無苦而乃有樂以慈悲故歌利王等準涅槃經說我念往昔生南天竺富單那城婆羅門家是時有王名迦羅富其性暴惡憍慢自在我於爾時為衆生故在彼城外寂然禪思爾時彼王春木華敷與其眷屬宮人綵女出城遊觀在林樹下五欲自娛其諸綵女捨王遊戲遂至我所我時為欲斷彼貪故而為說法時王見我便生惡心而問我言汝今已得阿羅漢果耶我言不得復言獲得不還果耶我言不得復言汝既年少未得如是二果則為具有貪欲煩惱云何恣情觀我女人我即答言大王當知我今雖未斷貪欲結然其內心實無貪著王言癡人世有仙人服氣食果見色尚貪況汝盛年未斷貪欲云何見色而當不著我言大王見色不貪實不由於服氣食果皆由繫念無常不淨王言若有輕他而生誹謗云何得名修持淨戒我言大王若有妒心則為誹謗我無妒心云何言謗王言大士云何名戒我言忍名為戒王言若忍是戒當截汝耳若能忍者知汝持戒即截我耳時我被截容顏不變時王群臣見是事已即諫王言如是大士不應加害王告諸臣汝等云何知是大士諸臣答言見受苦時容顏不變王復語言我當更試知變不變即劓其鼻刖其手足爾時菩薩已於無量無邊世中修習慈悲愍苦衆生時四天王心懷瞋忿雨砂礫石王見是已心大怖畏復至我所長跪而言惟願哀愍聽我懺悔我言大王我心無瞋亦如無貪王言大德云何得知我即立誓我若真實無瞋恨者令我此身平復如故發是願已身即平復今言問得四果者蓋通相而言也論云下義如後釋二反顯何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨徵意云以何義故得知無我等相釋意云若有我相應生瞋恨既不瞋恨則無我相如昔立誓若實無瞋身即平復以無瞋故則知無我以無我故方成真實忍波羅蜜支離也二引多生證相續忍須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相意恐人謂只是一度能為此忍故說過去已五百生或恐人言無我能忍應可暫時若使頻為必不能爾故說多生悉皆如是或恐人言有何所因無我能忍故說多生忍之熟故含此三意故有是言也纍苦故忍熟而樂但與正定慈悲相應故偈云離我及恚相實無有苦惱共樂有慈悲如是苦行果纍苦故者本疑纍苦難忍卻由纍苦能忍斯則翻前三意中後二意也而樂者然有四意故樂一為忍熟故樂如役力之人久得其志也二為正定故樂常踞大定寂滅不動故三為愍他故樂如孩子杖父父即樂生四為自利故樂以將此幻形易得堅質具茲四意故言樂也今文但有前三意故偈云下引證如是苦行果者對破疑情也謂因苦果還苦因樂果還樂故不同也如陶金作器器還是金和土脫墼墼還是土前徵云何此法不成苦果今此結云如是苦行故不成苦果也二勸離相以安忍疏二初引論敘意論云若有菩薩不離我相見苦行苦欲捨菩提心故勸離相無著云為對治不忍因緣有三種苦謂流轉苦衆生相違苦乏受用苦若有等者出勸之由也謂不能安忍欲捨菩提心由見苦故見苦是苦者由不離我相故若離我相則不見苦自然成忍不捨菩提故今勸之令離相也夫菩提心者謂上求下化二利不息既若見苦為苦即不能忘身捨命出生入死是故便捨大菩提心如舍利弗本發大心行菩薩行至六住被乞眼睛便生瞋忿不成忍行捨大歸小蓋由我相也三種苦者前二即次文後一即當第十疑中心住於法行布施等是也意明住相行施墮有漏中受用欲樂疲乏生苦也亦可有漏有限有限故乏受用乏受用故生於苦也然今依天親科經故不收入此段前二文理相似故全用之二分文正釋二如疏列文二初總標是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心意云以是無我相等得成忍行故彼諸菩薩應須離相發菩提心若離相發心雖逢大苦即能不捨無著云離一切相者謂離如是三苦相也若離等者住相既捨菩提不住即成大忍菩提之心自然久固何捨之有也無著下可知二別顯二初對治不忍流轉苦不應住色生心不應住聲香味觸法生心應生無所住心若心有住則為非住是故佛說菩薩心不應住色布施意云不應住於色等六境生於妄心應生無住菩提之心若心有住色等境界則為非住菩提也以是義故佛於正答問之中說菩薩心不應住於色等布施菩薩之行處處皆同故引前文以證於後也初正明流是集諦轉是苦諦無著云若著色等則於流轉苦中疲乏故菩提心不生後引證引前說無住施具含六度證此文矣流是下解科文此即四諦之中前二世間因果也大雲解云集招苦果故說為流生死不停故名為轉斯則襲習綸輪之義也著色等者著色等即疲乏菩提心不生不著色等即不疲乏菩提心生矣引前等者是上修行中文已如前說二對治不忍相違苦須菩提菩薩為利益一切衆生應如是布施如來說一切諸相即是非相又說一切衆生即非衆生意云菩薩行行本為利益衆生故便離相行於布施若能離相則衆生相違時不生疲乏也況我法二相如來說為非相耶以皆本無故須離矣若其本有何用離之勸離之旨方茲著矣疏二初引無著顯意無著云既為衆生行施云何於彼生瞋由不能無衆生想故衆生相違時即生疲乏故顯示人無我法無我既為等者蓋不合為而為之也如人邀客本為供承見有所須反生凌辱於理如何由不能下出瞋之所以也故顯下出經意也但無此二心必相應二約天親釋文論云諸相者衆生相也非相者無我也陰中見我是衆生相一切衆生者五陰法也非衆生者陰空故法無我也乏受用苦配在後段衆生相者以魏經云一切衆生相故陰中等者今於陰中不見有我故云非相也五陰法者以彼衆生皆用五陰之所成故陰空等者以無能成之五陰故云法無我也然此人法二相本自空無衆生不知妄執為有今所說者意令知而離之也又此我法經文文與意反文即先法後人意則先人後法魏經之內文句昭然故今疏中順意釋也乏受用下可知九斷能證無體非因疑疏二初隨章敘疑論云於證果中無道云何彼於果為能作因初句述疑意兼指疑起處也此從前第三第七中來以彼校量內外財施不及持經以此得菩提故遂起疑云若然者且言說是因因即是道以此證果理則不成何者以果是無為無為有體因是有為有為無體無體之道不到果中云何說此而為因耶二依經斷疑二如疏列斷之文二初斷疑須菩提如來是真語者實語者如語者不誑語者不異語者意云如來之言真實無異皆如其事不誑衆生持說必趣菩提汝等云何不信又以如來說於真實等故名如來為真實語者由是者字皆屬如來疏二初略銷經意佛所有說皆如其事今說證果何疑不然此通說斷疑之意皆如其事者即下四語所說之事今說等者以彼況此也意云彼既無謬此豈不然二廣釋五語真語者說佛身大菩提法也是真智故實語者說小乘四諦諦是實義如語者說大乘法有真如小乘無也不異語者說三世授記等事更無參差佛將此四語不誑衆生是故秦譯加不誑語佛身即真身也以法報合論理智無二故若欲分文別指則佛身是報大菩提法為法也是真智者以菩提是覺覺即智故論云依此法身說名本覺法報合說同名真身如來說此真智之法乃名如來為真語者此則以所說名能說也餘皆例此諦實等義已如前說如語等者小乘雖有生空之理非實真如以是偏真未徹源故大乘之內具顯三空空病亦空是究竟真如法也不異者與三乘弟子授記劫數久遠名號壽量國土等事一一不異故也佛將等者謂本來只有四語秦什譯時加此一語欲以統收四語發明佛意用之斷疑也應可一一舉而問之以顯不誑之義且如佛說大菩提法為真智時為真不真耶則對曰真當知如來是真語者斯則不誑之義明矣他皆例此說此四事既不誑人今說此經受持得菩提果豈成誑耶云何不信雖此言說有為無體之因能證離言無為有體之果故偈云果雖不住道而道能為因以諸佛實語彼智有四種亦如淨名云文字性離即是解脫無離文字說解脫也二離執須菩提如來所得法此法無實無虛意者前雖以言遣疑又恐隨言生執聞說依言得菩提便謂言中有菩提及聞言中無菩提便謂畢竟無菩提不達言空而法實故作斯執今則遣之故云如來所得等也無實者如言說性非有故無虛者不如言說自性有故如言等者謂言說緣生本無自性言中菩提亦同言說何以故有名無實故如言於火但有火名名言二法皆無體性故云如言等也不如等者不似言說也謂言說畢竟無體菩提之法即不無也但以不在言中不無離言之法如言中之火雖無不無離言之火由是言中雖無火不妨因言而得火言中雖無菩提不妨因言而得菩提以依言進修必證果故若然者則不應言中執有離言執無達此有無方云離執故偈云順彼實智說不實亦不虛如聞聲取證對治如是說十斷如遍有得無得疑疏二初隨章敘疑論云若聖人以無為真如法得名彼真如一切時處恆有何故有得者有不得初句指疑起處此從第三中來準彼但云無為不言真如今所言者揀餘無為故所以揀者欲顯所疑要成遍義餘無為法有不遍故彼真如下立理也如華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得斯則處及塵塵時該念念故也何故下結成疑既遍時處即合皆得何故有得不得耶二依經斷疑二如疏列斷之文二初舉喻斷疑須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色意云若住法行施則不得真如如入暗中一無所見若無住行施則得真如如太陽升天何所不矚真如雖遍得失在人義理昭然竟何所惑論云無智住法心不清淨故不得有智不住法心清淨故得有目者如得對治法日光者如所治暗盡能治現前空喻真如色喻性上萬德無智等者謂無般若觀照之智由無智故即執著色等六塵及空有等一切法也以住是執著之義故云住法心不淨者由執著故為塵所染正智不生不證真理故云不得得即證也有智等者反前可見對治等者以經中具有法喻疏中配釋影略難明今要預說方會疏文謂喻中有五一空二色三暗四日五目法中有四一真如二性德三煩惱四智法四喻五數不齊者以空喻真如色喻性德暗喻煩惱日目二事同喻一智所以然者以日目二事各有一能智慧之中具有二義日能破暗如智斷惑目能見空如智證理既目無破暗之義日無見空之能約義分之但有四對法喻喻中意者且如虛空無所不遍一切色法亦滿世間百千萬人悉在其內日光未出六合瞑然雖在空而不見空雖對色而不見色苟或日出昏暗盡除眼目開明空色皆見匪但空無邊際身在其中反思暗瞑之時不曾暫出法中亦爾謂真如之理周遍十方性上功德亦遍一切衆生無量悉在其中以智慧未生唯是癡暗雖在真內何曾見真雖有性德不見性德苟或智慧明發惑暗盡除真性廓周自然明見匪但性無邊際身在性中反思迷暗之時不曾暫離故肇公云道遠乎哉觸事而真聖遠乎哉體之則神彌勒頌云時及處實有為不得真如無智以住法餘者有智得對治法者即智慧也以日目二種同喻此故謂日是能治暗是所治所治之暗既盡能治日光現前即能見其色等法中惑智例此言也故偈云暗如愚無智明者如有智對法及對治得滅法如是二讚經功德二讚德者以顯得真如為由心淨心淨由不住法不住法緣有智有智蓋由聞經當知此經有其勝德故須讚歎以示將來勝德之相即下十段初總標須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德經意可知所言以佛智慧知功德者意謂除佛世尊餘無知者蓋顯功德之殊勝也無著云讀誦者此說受持因故為欲受故讀為欲持故誦論云受持修行依總持法故讀誦修行依聞慧廣故是則從他聞法內自思惟為得修行智也故偈云修從他及內受持因者標也為欲下釋欲受其文故先讀欲持其義故先誦是故受持皆由讀誦故分因果也受持等者謂依總持法而受持修行若文若義總能領納方曰受持此則思慧也讀誦等者謂依聞慧廣故讀誦修行若無所聞憑何讀誦此聞慧也論云廣多讀習亦名聞慧然皆言修行者蓋通相說也非是三慧中修慧以修慧與理相應唯局無漏出於讀等四法之表故不配之但約聞思二慧共所成就故次云是則從他聞法等故偈下引證從他即聞慧也及內即思慧也二別顯十初捨命不如二初捨命福須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施偈云以事及時大福中勝福德以事等者以前來已說命施此中復說者蓋時事俱勝故時即布施之時事即布施之事前但一度施一河沙身命時事皆小今則無量劫中日復三度以河沙身命布施時事皆大是捨命福中勝福德也二信經福若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說經意可知不逆者是不謗義也魏經如此信經劣於持說多命勝於前喻信經等者謂能所校量之中皆有勝劣能中一河沙數為劣三時多劫為勝所中信經為劣持說為勝前則以劣況勝此則以勝況劣前淺後深天地之遠矣二餘乘不測須菩提以要言之是經有不可思議不可稱量無邊功德意云若具足讚歎終不可窮以實言之有無邊功德等也偈云非餘者境界無著云不可思議者唯自覺故不可稱量者無有等及勝故非餘等者非二乘菩薩能盡知也故前云以佛智慧而悉知故又下文云當知是經義不可思議果報亦不可思議佛尚如此餘豈能知自覺者謂以心思口議但及名相之境此非名相故不可思議唯證相應故也等及勝者兩意一則無有等此勝功德故二則無有勝於此故無有等於此故故心經云是無上咒是無等等咒及即等義故不別標也三依大心說如來為發大乘者說為發最上乘者說意云以非餘者所知故故為最上者說最上者一佛乘也一佛乘者經中初標大乘名恐濫於權教故復揀云最上乘者今疏中出最上乘體故云一佛乘也體當本覺故名為佛非二非三故名一乘故魏經云為住第一大乘衆生說即當善吉所為機發無上菩提心者四具德能傳若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提意云若能宣說受持此則修行二利能令佛種不斷則名荷擔菩提成就等者偈云滿足無上界荷擔者無著云肩負菩提重擔故滿足無上界者滿足即成就義界即因義意明不可量等功德與無上菩提為因故也荷擔等者在肩曰擔背負曰荷今明行菩薩行即是荷擔謂以大悲下化以大智上求以大願雙運安於精進肩上從煩惱生死中出念念不住直至菩提真性自他一時解脫方捨此擔法炬經中具有此說今經云受持讀誦即自利廣為人說即利他既若二利兼行必以大願為體由是能令佛種不斷故名荷擔菩提也五樂小不堪何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解說徵意云云何唯為大乘者說何故持說名為荷擔菩提釋意云以樂小者著我等見不能持說故知能持能說是最上乘荷擔菩提之者問何者名為小法誰為樂小之人答四諦緣生名為小法聲聞緣覺即是樂小之人滯情於中乃名為樂彼有法執此顯三空是其非處故不能持說故魏經云若有我人等見於此法門能受持者無有是處當知若能持說即是樂大法者不著我人等見也問聲聞緣覺已達我空云何經中而言著我答以我人等見是心心所法著之即是法執故指緣覺聲聞也或可樂小法者即是聲聞緣覺著我見者即是一切凡夫六所在如塔須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處意云經顯法身依法則有報化三身既存塔廟斯在是故此處勸應供養準纂靈記說隋朝益州新繁縣王者村有書生姓苟未詳其名於彼村東空中四面書之村人謂曰書者何也曰我書金剛般若經曰何用焉曰與諸天讀之時人見聞若存若亡彼屬霖雨流水滂沛唯此地方丈餘間如堂閣下竟無沾溼於是牧童每就避雨時人雖在莫知所由至武德初有西僧至神貌頗異於此作禮村人謂曰前無殿塔為何禮耶曰君是鄉人耶曰然僧曰君大無識此有金剛般若經諸天真蓋其上不絶供養云何汙踐使其然乎村人乃省苟生寫經之處自此遂甃甓嚴闌護之不令汙踐苟至齊日每常供養瞻禮者往往有聞天樂之聲迄今其處雨不能溼且空書無跡尚乃如斯況紙素分明而不能爾七轉罪為佛復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提意云如過去造極惡合來世墮三塗者苟遇此經受持讀誦功力既著能消極惡遂以現遭輕賤之事更不墮於惡道即是轉重業令輕受也持經無我等相即煩惱障盡極惡消滅即業障盡不墮即報障盡三障既滅三德必圓故云當得菩提也輕賤者總包於中或打或罵故隋譯云輕賤甚輕賤無著云此毀辱事有無量門故復云甚輕賤當得菩提者罪滅故總包等者以打罵等事皆名輕賤故隋譯下引證無著下轉釋無量者以身口意三所為之事但不饒益皆屬輕賤也故云無量罪滅者罪障既盡漸漸修行因圓果滿自然為佛經言當得意顯後時非謂現世得成佛果餘轉滅等義已於懸談五因中說竟八超事多尊疏二初總敘意論云示現速證菩提法故意明持說此經速證菩提之法所以超過如來事多世尊之福故偈云福不至菩提二能至菩提也二別科釋二如疏列文二初供佛多中全具福須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者經意可見然燈前者以釋迦因地修行經三無數劫第一劫滿遇寶髻如來第二劫滿遇然燈如來第三劫滿遇勝觀如來今云然燈前者即第二劫中也那由他者十億為洛叉十洛叉為俱胝十俱胝為那由他那由他者第九數數當萬萬也二持經多中少分福若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及經意對前比量可解然所不及者有二義一彼得福德此得菩提故二彼有我相此無我相故故前云此人無我人相等也九具聞則疑須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心則狂亂狐疑不信意云前雖校量亦未具說若具說者人必狐疑狐者狡獸也以多疑故故云狐疑述征記云風徑河冰始合要須狐行以此物善聽聽冰下水無流聲即過也魏經即但云疑惑十總結幽邃須菩提當知是經義不可思議果報亦不可思議意云校量不及佛不具說者以此經義及持者果報皆不可心思言議故也無著云此顯示彼福體及果體不可測量故福體者經義也為福所依故果體者佛菩提也測量即思議也以福田佛果皆無相故然科云總結幽邃準此所判但局第十疑中今若詳之兼該三七之二以始自第三乃至第十邐迆次第五度校量謂外財兩度內財兩度佛因一度且第一以一三千界七寶布施校量不及持說第二以無量三千界寶施校量不及第三以一河沙數身命布施校量不及第四以無量河沙數身命布施校量不及第五以如來因地供養諸佛功德校量不及至此第五是校量之極更無譬喻可以比況故云乃至算數譬喻所不能及苟或具說人必生疑故復云我若具說者或有人聞心則狂亂狐疑不信自此之後讚校都絶所以望前數段故總結云當知是經義不可思議等也問此至經末猶有數處校量云何輒言無校量耶答餘所校量但是別意以之斷疑實非前說五重次第也由是隨時略舉一三千界寶或須彌聚寶或阿僧祗界寶以為校量若不然者豈得勝義之後卻舉劣福為次第耶十一斷住修降伏是我疑疏二初隨章敘疑佛教我住修降伏兼不住前十種疑執過患若無我者誰人受教誰人住修誰人如此離過云云亦云除微細執故偈云於內心修行存我為菩薩此即障於心違於不住道初二句指疑起處住修等者即正答三問及次前十段也若無下結成疑既教我住修離過豈是無我無人若言無我誰住修離過耶亦云下敘別義除細執者即是第二疑中未除之者故今舉之令其除斷問執與疑何別耶答執則堅著疑乃不決若據論意正是除執不言斷疑今疏云斷疑者若言除執文勢孤起血脈不貫故依諸疏以立此疑偈云下引證除執也道之與心蓋是一法但以心本無我而執我道本不住而成住故立障心違道也然此疑執之文若詳經義別分則從爾時須菩提至則非菩薩是斷疑後之一段是除執也故論中釋已偏指後文二依經斷疑二如疏列斷之文二初問爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心文雖似前問意全別意云若人發心則無有我是誰降伏其心反覆如上所說二答三初若名菩薩必無我佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者意云若人發菩提心已當生度盡一切衆生之心然不得起有衆生可度之念亦不可起我能度之念念既不起即無我無我即名菩薩也二若有我相非菩薩何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩徵意云以何義故度衆生令不起衆生之念耶釋意云若有我相衆生相等非菩薩故前約所度之境此約能度之心心境合論通名為我既前後互舉則顯能所皆無也三能所俱寂是菩提所以者何須菩提實無有法發阿耨多羅三藐三菩提心者徵意云前無所化之境次無能化之心所以要無能所者何謂也釋意云以能所俱寂方是菩薩故法之一字能所俱攝十二斷佛因是有菩薩疑疏二初隨章敘疑論云若無菩薩云何釋迦如來於然燈佛所行菩薩行初句指疑起處即從次前文中來也以前云無發心者發心者即是菩薩故云何下結成疑也然燈即是釋迦因地第二劫滿所遇之佛既於彼處行菩薩行云何乃言無發心者二依經斷疑四如疏列斷之文四初舉疑處須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不意云汝意之中頗謂我於然燈佛所得菩提不若得菩提何成菩薩是彼疑處故舉問之降怨王請然燈佛入城城中長幼盡迎路泥善慧布髮佛與授記故舉此問此敘其本事也準本行經說昔有大城名為蓮華城中有王名曰降怨有一婆羅門名曰日主為王所重分與半國封授為王別為王城名為埏主日主夫人名為月上然燈菩薩降神右脅出家成道時降怨王將欲迎請遂敕城內外十二由旬禁斷諸華不令私賣王皆自買以供如來彼國雪山南面有一梵志名曰珍寶有五百弟子中有一弟子名之雲童或名善慧於彼衆中而為上首所有仙法皆學已了辭師還家師曰汝今將歸須以清淨傘蓋革屣金杖乃至金錢五百報我之恩雲童曰我今並無此物但放我去得即送來師即放之雲童因赴無遮之會得五百金錢便欲送還師處因至蓮華城內見城嚴麗即問於人乃知然燈如來欲至遂將三百金錢於一婢子處買得五枝優鉢羅華兼彼女子寄華兩枝共為供養時佛入城即以此華散佛頂上以願力故成於華蓋隨佛行住佛神力故化一方泥善慧見之布髮而掩復作是念願得如來踏我身過若不蒙記莂我終不起如來即至履之而過止諸徒衆皆不令踏即授其記作如是言此摩那婆於未來世當得作佛號釋迦牟尼十號具足如我無異今善吉意云既若買華供佛布髮掩泥即是菩薩若此非菩薩者則孰為菩薩與二斷疑念不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提意云我意不謂如來得菩提也我已解佛所說之義於彼佛所無有一法得為菩提善慧彼時都無所得離諸分別由無法故得記若有法者是有相心不順菩提佛不與記彼時者蓮華城中授記之時也智與理冥心與神會無所得之法無能得之心故云都無等也由無等者即指上無得而得夫菩提之為法者寂滅無生不空不有離一切相若離能所則順菩提得佛授記若存能所心境不亡則與菩提極相違逆如何得記故淨名云寂滅是菩提滅諸相故三印決定佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提意以空生之言稱其實理故云如是實無下如來述成可知論云我於彼時所修諸行無有一法得阿耨多羅三藐三菩提功德施論引佛說云若見於佛即見自身見身清淨見佛清淨見一切智智皆悉清淨是中見清淨智亦復清淨是名見佛我如是見然燈如來得無生忍一切智智明了現前即得授記是授記聲不至於耳亦非餘智之所能知我於此時亦非惛懵無覺然無所得我於彼時者即受記及修行時也無有一法得菩提者此約橫豎顯之橫則於六度萬行之中行行皆無得義若布施得菩提則不要戒忍等豎則初中後念念念皆無得義若初念得何須念念相續等如是橫豎心行之中皆無得菩提義也功德施下未詳何經若見等者以自他之相相待而成既見於他必須見自見身清淨等者反於前也清淨即是空義見他既見於自不見自則不見他成既相因而成泯亦相因而泯如淨名云如自觀身實相觀佛亦然亦如志公云以我身空諸法空千品萬類悉皆同亦同莊子中說因有而有之因無而無之也見清淨智等者非唯無所見之自他兼無能見之智用斯則能所雙泯也圓覺經云依幻說覺亦名為幻既皆是幻豈得存耶然雖能所兩亡不成斷滅以靈源真心本無能所妄生能所即是乖真能所既除即合本體靈然不昧物我皆如故華嚴云能見及所見見者悉除遣不壞於真見是名真見者又圓覺云諸幻盡滅覺心不動是名見佛者結成見義如上用心方得見佛若生分別執相違真則不名見故華嚴云一切法不生一切法不滅若能如是解諸佛常現前得無生忍者謂以正智忍可印持無生法故以一切法本無生滅衆生迷倒妄見生滅苟離妄見正智即生契合本體達一切法本來無生名無生忍例而言之見一切法無滅亦名無滅忍今則舉初以攝後也一切智智者是達一切諸法之智表用非一故重言耳有云依於始覺顯得本覺智中之智名智智也得授記者準楞嚴經記有四種一未發心時與記或有流轉五道生於人間好樂佛法過百千萬億劫當發心過百千萬億劫行菩薩道供佛化生皆若干劫當得菩提二適發心與記者是人久劫種諸善根好樂大法有慈悲心即住不退地故發心與記三密記者有菩薩未得記而行六度功德滿足天龍八部皆作是念此菩薩幾時當得菩提劫國弟子衆數如何佛斷此疑即與授記舉衆皆知此菩薩獨不知四無生忍記者於大衆中顯露與記也今當第四也謂散華佛頂布髮泥中依有漏心得無生智於大衆前分明記莂也聲不至耳者能所俱寂以離分別心故心既不起耳何所聞亦非餘智等者此無分別處非謂別有一智能知故圓覺云離遠離幻亦復遠離亦非惛懵等者恐聞都無分別亦非餘智便謂同於木石一向頑凝故圓覺云諸幻盡滅覺心不動然即此覺心亦無所得故頌云若時於所緣智都無所得等此則離沈離掉了然寂然妙契本心竟何所得善慧彼時心同此也四反覆釋須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼無著云若正覺法可說如彼然燈所說者我於彼時便得正覺然燈則不記言來世當得以法不可說故我於彼時不得正覺是故記言來世當得若正覺下釋反釋也以法不可說下釋覆釋也據此則善慧彼日但聞其言言性本空竟何有得但約妄惑盡處真智現前當此之時義言得矣校訛第三紙十四行已北藏作以楞嚴寺流通本同誤第四紙八行答北藏作不十二行是北藏作事第八紙八行中文北藏作文中第十紙六行誑北藏作狂第十一紙五行竟北藏作意十行誑北藏作狂十五行而道之道北藏作首第十二紙五行有故北藏作故有第十五紙十九行北藏脫為字第二十紙三行已北藏作以第二十六紙十六行寂北藏作即二十行寂北藏作十第二十八紙七行報我之我北藏作感第三十紙四行授五行授北藏皆作受十五行而泯之泯北藏作滅第三十二紙六行莂北藏作一刻二字九行知北藏作智又即此字下脫故字已上流通本皆同誤
