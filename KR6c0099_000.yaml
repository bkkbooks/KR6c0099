  text: 金剛般若經疏記會編科文纂要疏文分三初標題目二初經疏名題二作者嘉號二敘宗旨二初敘讚經旨二初通明起教之緣二初明迷真起妄二初真空二妄有二明習妄流轉二別明說教之意二初敘說阿含之意二初正敘二結判二敘說般若之意二初總示大部二初敘教釋意二顯瑞彰會二別示今經二初略標指二廣敘讚二初敘歎幽玄二初具敘一經詮旨三初正敘二反顯三順結二結歎四法幽玄三初正結歎二示難了三彰謬解二引文結顯二述造疏意二初示疏論師承有據二初示論師承斥他添削二明今述解不攻異端二示名題義意在下三解本文二初偈文歸請二開章正釋二初標列章門二依章正釋四初辨教起因緣二初總論諸教二初通赴機緣二剋就佛意二別顯此經五初對治我法二執三初標二釋二初總標拘執起障二別示二障過患二初煩惱障二所知障三結二遮斷種現二疑二初標二釋三轉滅輕重二業二初標二釋四顯示福慧二因三初標二釋二初未說失為凡小二已說得為佛因二初順釋二反顯三結五發明真應二果三初標二釋三結二明經宗體二初明宗二初統明諸教二別顯今經三初約法正立二約喻釋成三約行結顯二明體三初標立二正釋三總結三分別處會二初總明佛說大部處會二初總示大部二別顯此經二別明傳譯此卷時主三初正明東土翻譯前後二初通辨諸譯二剋示所傳二因辨西方解釋異同三示今科判依據差別二初正明科釋所依二結成立題所以四釋通文義二初解題目疏二初釋所詮三初釋金剛二初翻名示相二約法辨義二初引經論總彰二義三初總標深辨二引教委釋三結顯喻旨二引真諦別示六種二初正明六種二結示傍正二禪般若二初翻名略指二引教廣釋二初引論別相釋二初明總攝三慧二引論文釋成二初正釋成二配因果二初雙引論二雙解釋二引經通相釋三釋波羅蜜三初約語對翻二約義順釋二初釋義二通難三順義通結二釋能詮二初翻名二釋義二釋經文疏二初科分二隨釋經三初序分二初證信序疏三初明建立因二明建立意三正釋文義二初標列述意二依科解文六初信二初合釋二單釋二聞二初正釋我聞之義二商較所聞之法三時二初揀顯釋二會法禪四主二初翻名二釋義二初引論正釋二初約體離念釋二約位三義釋二引論反釋三初反顯二引證三順結五處二初釋舍衛二釋祇園二初總指二別釋三初釋祗陀二釋給孤三釋園字六衆二初釋標類二釋舉數二發起序疏二初敘意二隨釋經二初戒疏七初釋化主二釋化時三釋化儀四釋化處五釋化事六釋化等七釋化終二定疏二初正解此文三初併資緣二淨身業三正入定二通前表法二初約大雲廣辨三初標二釋二初表通序二表別序三結二引資聖略明二初正明二引證二正宗分三流通分二正宗分疏二初標列章門二依章隨釋二初依無著懸判三初正示七句二初牒標二隨釋七初種性二發起三住處四對治五不失六地位七立名二總指後四三廣釋第三三初正辨十八住處二初牒標二隨釋十八初發心住二波羅蜜相應住三欲得色身住四欲得法身住五修道無慢住三初正示此文二通敘後段三別結對沿六不離佛世住七願淨佛土住八成熟衆生住九遠離外論住十觀破色身住十一給侍如來住十二遠離退失住十三忍苦住十四離寂靜味住十五證道離喜住十六求佛教授住十七證道住十八上求佛地住六初國土淨具足二見智淨具足三福自在具足四身具足五語具足六心具足二重以八義相攝三更約地位配釋二依天親科釋二初牒章分文二依章正釋經四初善現申請二初整儀讚佛疏二初釋請人二釋請儀二初正釋經文二別解菩薩二正發問端疏二初釋當機二釋正問三初釋魏本二會當經三引論證二如來讚許疏三初印讚所讚二敕聽許說三標勸將陳三普現佇聞四如來正說二初正答所問二初舉總標別以牒問疏四初正釋經文二斥他謬判三詳定經旨四牒難釋通二約別顯總以答問二初答安住降心問四初廣大心疏二初釋標二釋列三初受生差別二初釋文二通難二依止差別三境界差別二第一心三常心四不倒心二答修行降心問五初總標二別釋三總結四顯益疏二初科釋文意二別辨喻旨五結勸二躡跡斷疑疏二初約諭分文二依論科釋經二十七初斷求佛行施住相疑疏二初隨章敘疑二依經斷疑經四初舉疑因以問二防相得以酬三釋體異有為四印佛身無相疏二初釋前二句二初正釋二引證二釋後二句二初正釋二引論釋四初引起信二引肇注三引本論四引無著二斷因果俱深無信疑疏二初隨章敘疑二依經斷疑經四初約無信以呈疑二訶疑詞以顯信三明能信之所以二初明歷事善友積集信因二明善友所攝成就信德二初明攝受得福顯福德門疏二初釋佛知見二釋得福德二明攝受所以顯智慧門疏二初敘意二科釋經二初正明已斷蟲執疏二初師釋經文二商較經旨二因顯未除細執疏二初釋總明二相二釋別明二相二初正辨二相二別解徵意四示中道之玄門三斷無相云何得說疑疏二初隨章敘疑二依經斷疑經二初問答斷疑四初舉疑因以問二順實理以酬三釋無定法之言疏二初引無著二引天親二初釋文二通難四釋無取說所以二較量顯勝四初舉劣福以問二釋福多以酬三判經福超過疏二初正釋經文二別示句相四釋超過所以二初正釋二轉釋四斷聲聞得果是取疑疏二初隨章敘疑二依經斷疑經四初入流果疏三初正釋經文二商較果證三結斷疑情二一來果三不來果四不生果疏二初辨得名二分科釋經三初舉所得以問二明無取以答三引己證令信三初明佛先印二彰己不取三卻釋佛意五斷釋迦然燈取說疑疏二初隨章敘疑二依經斷疑六斷嚴土違於不取疑疏二初隨章敘疑二依經斷疑經三初舉取相莊嚴問二釋離相莊嚴答三依淨心莊嚴勸七斷受得報身有取疑疏二初隨章指疑二依經斷疑經二初問答斷疑疏二初總釋喻旨二別解非身二初牒經略指二引論廣釋二初引本偈二引論文三初雙標二雙釋三雙結二較量顯勝二初約外財較量廣顯經勝二初較量勝劣三初約多河以辨沙二約多沙以彰福三約多福以顯勝二釋勝所以五初尊處歎人勝三初明處可敬二顯人獲益三顯處有佛二約義辨名勝三佛無異說勝四施福劣塵勝五感果離相勝二約內財較量倍顯經勝二初較量勝劣二擇勝所以五初泣歎未聞深法勝二淨心契實具德勝二初正明二拂跡三信解三空問佛勝三初總標信解二別顯三空三如來印定四聞時不動希有勝五大因清淨第一勝八斷持說未脫苦果疑疏二初隨章敘疑二依經斷疑經二初明超忍以斷疑二初明忍體二明忍相二初引一生證極苦忍二初正明二反顯二引多生證相續忍二勸離相以安忍疏二初引論敘意二分科正釋經二初總標二別顯二初對治不忍流轉苦二對治不忍相違苦疏二初引無著顯意二約天親釋文九斷能證無體非因疑疏二初隨章敘疑二依經斷疑經二初斷疑疏二初略銷經意二廣釋五語二離執十斷如遍有得無得疑疏二初隨章敘疑二依經所疑經二初舉喻斷疑二讚經功德二初總標二別顯十初捨命不如二初捨命福二信經福二餘乘不測三依大心說四具德能傳五樂小不堪六所在如塔七轉罪為佛八超事多尊疏二初總敘意二別科釋經二初供佛多中全具福二持經多中少分福九具聞則疑十總結幽邃十一斷住修降伏是我疑疏二初隨章敘疑二依經斷疑經二初問二答三初若名菩薩必無我二若有我相非菩薩三能所俱寂是菩提十二斷佛因是有菩薩疑疏二初隨章敘疑二依經斷疑經四初舉疑處二斷疑念三印決定四反覆釋十三斷無因則無佛法疑三初斷一向無佛疑疏二初隨章敘疑二依經斷疑經二初顯真如是佛故非無二明佛即菩提故無得二斷一向無法疑疏二初隨章敘疑二依經斷疑經二初遣執遮疑二釋義斷疑三顯真佛真法體十四斷無人度生嚴土疑疏二初隨章敘疑二依經斷疑經三初遮度生念三初明失念二明無人三引前說二遮嚴土念二初明失念二釋所以三釋成菩薩十五斷諸佛不見諸法疑疏二初隨章敘疑二依經斷疑經二初約能見五眼明見淨疏二初引偈彰意二分科釋文經五初肉眼二天眼三慧眼四法眼五佛眼疏二初局釋當文二通前總顯二初引無著義總釋二約古德偈重結二約所知諸心明智淨五初約一箇恆河以數沙二約一河中沙以數河三約沙河中沙以數界四約爾所界中所有生五約一一衆生所有心三初總明染淨以標悉知二會妄歸真以釋悉知三推破雜染以釋非心十六斷福德例心顛倒疑疏二初隨章敘疑二依經斷疑經二初問福答福二反釋順釋疏二初引論正釋二問答解妨十七斷無為何有相好疑疏二初隨章敘疑二依經斷疑經二初由無身故現身二由無相故現相十八斷無身何以說法疑疏二初隨章敘疑二依經斷疑經三初遮錯解二釋所以三示正見十九斷無法如何修證疑疏二初隨章敘疑二依經斷疑經三初以無法為正覺二以平等為正覺三以正助修正覺二十斷所說無記非因疑疏二初隨章敘疑二依經斷疑二十一斷平等云何度生疑疏二初隨章敘疑二依經斷疑經四初遮其錯解二示其正見三反釋所以四展轉拂跡二十二斷以相比知真佛疑疏二初隨章敘疑二依經斷疑經五初問以相表佛二答因苗識根三難凡聖不分四悟佛非相見五印見聞不及二十三斷佛果非關福相疑疏二初隨章敘疑二依經斷疑經四初遮毀相之念二出毀相之過三明福相不失四明不失所以二初明得忍故不失二明不受故不失二初正明二徵釋二十四斷化身出現受福疑疏二初隨章敘疑二依經斷疑經二初斥錯解二示正見二十五斷法身化身一異疑疏二初隨章敘疑二依經斷疑經二初約魔界破一異五初細末方便破粗色疏三初引天親明斷疑二引無著破執法三引大雲示破相二不念方便破微塵疏二初約斷疑釋二約破法釋三不念方便破世界四俱約塵界破和合疏二初引天親解二引無著解五佛印無中妄執有二約止觀破我法二初除我執二初斥錯解二遣言執二除法執二初除分別疏二初明無分別所依二初總徵三法二別釋第三二初總標二別釋二初總彰三義二轉釋後義二正顯無分別理二顯本寂二十六斷化身說法無福疑疏二初隨章敘疑二依經斷疑經二初明說法功德二明說法不染疏二初引無著解二初申經意二銷經文二引大雲解二十七斷入寂如何說法疑疏二初隨章敘疑二依經斷疑疏二初開章指文二隨章辨釋三初約兩論釋九喻二初約本論斷疑二兼無著釋相二初據論分文二隨文正釋四初自性相二初釋章意二別解文三初星喻見二翳喻相三燈喻識二著所住味相三隨順過失相二初釋章意二正解文二初露喻身二泡喻受四隨順出離相三初釋章意二正解文三初夢喻過去二電喻現在三雲喻未來三總結示二約諸經顯喻意三會秦經明廣略二初指喻顯法二正會廣略三流通分疏二初隨經文別釋二引論疏讚釋十八住階位圖十八住階位圖說第一生配初發心住并攝前十信及餘九住共二十心二中是六波羅蜜故次配六行四中法身分言說證得於證得中開智相福相故配後三行第十八中有六種具足初一具足配二地至等覺十位後五無上具足配妙覺位其餘配屬可見詳夫諸教所說地位差互不同或說五十二位或將十信攝入十住但說四十二位於中或復開前合後開後合前或前後俱開俱合開之則廣合之則狹又或借小明大借權明實名相位號出入淆訛徇名遺旨多見差謬乃至楞伽諸典泯之全無纓絡等經具說成有若有若無若廣若狹皆隨宜之說也惟華嚴行布萬殊圓融一際有無闊狹悉皆無閡方為了義耳所以者何以約法則無約人則有今經云一切賢聖皆以無為法而有差別無為故無差別故有於差別中不無闊狹也論主既仰師補處深悉經義以宗派兼明故正住中道不墮有無以法喻齊顯故初後中間酌於闊狹配十八住處說三地五位誠盡善矣記主云然其行人念念須冥佛境反窮果海自然階降不同若預等級用心畢竟障於證入況此經宗無相豈合列位淺深但約情惑漸薄地位轉高義相稍同故略配攝也斯言得之然今之人乃有以此而病無著者嗟乎不解即相離相妄謂一向無相所以墮增上慢因果不分謬執經宗非毀先聖好心學般若者幸勿徇此一邊之見住於中道離障證真依無為法入賢聖位則庶乎其不差矣二十七疑脈絡圖二十七疑脈絡圖說首曰主者即不住相布施也以此是疑主故展轉生起至二十七於中第三出十疑第十一總承前疑是為脈絡肯綮處餘疑可知佛乃不思議人經名不思議說不思議者非思議能解也非思議能解者無思議者乃能解也無思議能解者非思議竟莫能解也何以故如上二十七疑來自經文之外已非思議所及然有次序來者有隔越來者有通貫來者有分承來者次或可知隔即難曉況通貫分承乎譬猶身中血脈地中泉脈經絡支派潛伏流注殊非尋常義現於文易開物解者比也況加之以粗心淺心徇臆見妄生穿鑿何關經義故曰非思議能解也彌勒以補處之智冥妙覺之經演難思之偈授登地之人曰斷種種疑天親始理疑脈以貫經曰斷二十七種疑故曰無思議者乃能解也昔者以文求義矛盾何多今也以脈定文參商斯絶違惟見其順塞惟見其通斷惟見其續暗惟見其明細心深心虛所見好古敏求之力也故曰非思議竟莫能解也好心學般若者當澄神攝慮熟玩而細研之將見此經全體血脈朗然躍現於文字句偈之表由是永斷群疑深解義趣依解起行行起解絶不妨從思議中親到無思議處即是親見不思議人親聞不思議說也尚勉之哉金剛般若經疏記會編序一切衆生自性般若與諸佛平等衆生唯妄執未謝故波迸六道甘淪溺而不之返世尊為說一切修多羅不過令其於己躬下證其本有如是之事而已然諸契經演說不同有曲有直有純有雜唯金剛般若一經破執斷疑最為直說純說者也此經總之則一析之有三種一曰實相般若如金之堅即理經也二曰觀照般若如金之利即行經也三曰文字般若如金之光即教經也利根圓獲鈍者淺執昔六祖大師聞客誦至應無所住而生其心中峰老人讀至荷擔如來阿耨多羅三藐三菩提豁然悟入此頓見實相最上利根也其次則明觀照又次則信文字至於但信文字根斯為下矣然末世頓入者少故理由行證行藉教明則文字實又二種般若之津筏也是經文則甚略而義該大部入位上流乍難窺測然自創譯已來此方疏釋約數百家深經淺解已謂少益況偏辭臆說至有不堪聞見者乎昔佛滅後西域有無著菩薩入日光定上升兜率詣彌勒問此經義彌勒以八十偈頌之無著出定與其弟天親各稟偈造論二論互釋經旨彌深仍非淺智所了唐圭山大師以妙悟之姿泳遊教海愍物興慈遂正本二論旁采諸說述纂要疏二卷辭精理極為衆釋中最然一往讀之不了者什猶六七石壁師別為廣解又失之太繁長水師復起而翦削之成刊定記而疏義顯矣疏義顯而後金剛般若教行理三經乃無不顯矣但今宇內謬解偏多傳講諸師又恆習世本各封己見以故鮮知宗尚嗟乎獨不思聖凡愚智藐若雲泥無著是登地菩薩天親是地前加行菩薩二人親稟彌勒彌勒是補處大士親稟釋尊今疏悉依二論則疏即佛語佛語不宗將誰宗乎策昔因閲藏幸遇斯文精研三復如獲重寶但以疏記別行尋討維艱文義連綿科章間錯起止血脈作者猶迷於是不量庸愚秉筆從事校經節疏會記編科繕寫嚴核至三脫其稿於中添削釐合殊費斟裁俾覽者無神昏目眩之嫌有執謝疑除之益特授剞劂以廣流傳或曰子禪者也乃事經疏之學耶豫曰噫子過矣請無遠論即圭山長水二師一則宗大鑑而徹禪源一則叩琅邪而悟心要亦皆續教內之真傳即文字而直指苟具正眼豈存二見況此般若者乃覺體之異名種智之殊號性空緣會法爾無差功德發心本無限齊吾將流通如是之經以期己他之兼利也流通文字用嚴化身流通觀照用嚴報身流通實相用嚴法身如是則為具足佛身何以故生了二因決能成就故經云是經義不可思議果報亦不可思議諸有福智者應作如是觀康熙甲辰歲仲夏之吉荊溪後學行策書於武林之河渚草堂例言此經六譯秦譯稱最傳布既廣訛舛滋多故校諸疏本亦各差互今經字句一依北藏原本勘正此經注釋無慮數百家雖有數家正疏然皆互有短長其盡善盡美唯纂要一疏而已故今疏文悉遵原本無敢移易其刊定記文既會歸本疏下首末開合不無增損字面貴使文義允當耳凡疏鈔合本多見以兩文並書而首標疏鈔字者其不便有二一者遇條分縷析處標字太煩二則於義未安蓋鈔不得與疏並列猶之疏不得與經齊等譬如經則父也疏則子也鈔則孫也倫次自應有別今初二卷以疏文頂格書記低一字自三卷以去則以經文頂格書疏讓經一字記復讓疏一字不同他本之式又記中有釋經之語未涉疏意者會在疏前令不失次第此中分科須辨四種不同有記中所列之疏科有疏中所列之經科有疏中自列之疏科并節釋之經科重繁錯雜初學多迷今前二種皆加圈別之仍分黑白使疏記首尾血脈通貫其後二種準疏文一例書之庶井然易見記中科題有遺前失後者竊意補之有應立不立者增入之有疏自列而記復列者翦削之或安科取便失次者隨位置之或科名未盡善者略更易數字非敢妄專務期允當覽者無以差脫見疑經文十八十九二疑之間有爾時慧命須菩提至是名衆生一段計六十二字秦譯原無係後人添入故疏不釋然魏譯有之二論亦皆釋之添亦無失況記有補釋之文今從世本添入如秦譯法華普門品中添入隋偈亦無失也配十八住處斷二十七疑為兩論之綱宗一經之樞要若階位不明則昧於橫判脈絡不清則迷於豎釋今各為圖說系於全科之後使開卷按圖瞭然在目不致尋文難了疏記兩文之中字句並多錯謬北藏且不可憑何論他本今則揆之文義苟一字不安必周遍搜尋得之舊冊或深思自悟釋然無疑具摘諸訛附於卷末一以見讎勘之難一以出藏本之誤惟覽者悉之
